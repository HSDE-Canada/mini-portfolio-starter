<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300"><rect width="900" height="300" fill="#f1fbf5"/><rect x="80" y="70" width="180" height="80" rx="18" fill="#e7f9ee" stroke="#28a36a"/><text x="120" y="118" font-family="Arial" font-size="22" font-weight="700" fill="#183b2b">Frontend</text><text x="305" y="118" font-family="Arial" font-size="35" fill="#28a36a">→</text><rect x="360" y="70" width="180" height="80" rx="18" fill="#e7f9ee" stroke="#28a36a"/><text x="415" y="118" font-family="Arial" font-size="22" font-weight="700" fill="#183b2b">Server</text><text x="585" y="118" font-family="Arial" font-size="35" fill="#28a36a">→</text><rect x="640" y="70" width="180" height="80" rx="18" fill="#e7f9ee" stroke="#28a36a"/><text x="685" y="118" font-family="Arial" font-size="22" font-weight="700" fill="#183b2b">Database</text><text x="230" y="225" font-family="Arial" font-size="22" fill="#547263">The frontend talks to the server, and the server talks to the database.</text></svg>