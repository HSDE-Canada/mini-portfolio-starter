<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340"><rect width="900" height="340" fill="#f1fbf5"/><rect x="80" y="55" width="740" height="230" rx="22" fill="#fff" stroke="#bde8cc"/><text x="110" y="105" font-family="Arial" font-size="24" font-weight="700" fill="#183b2b">Database helper functions</text><text x="110" y="155" font-family="Courier New" font-size="22" fill="#336b4b">getProjects() → read saved rows</text><text x="110" y="200" font-family="Courier New" font-size="22" fill="#336b4b">addProject(project) → save one row</text><text x="110" y="245" font-family="Courier New" font-size="22" fill="#336b4b">updateProjectStatus(id, status) → edit one row</text></svg>