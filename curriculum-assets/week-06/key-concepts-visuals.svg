<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f1fbf5"/>
  <text x="48" y="58" font-family="Arial" font-size="34" font-weight="700" fill="#183b2b">Week 6: Databases</text>
  <text x="48" y="92" font-family="Arial" font-size="18" fill="#547263">Concrete outputs for SQLite tables, saved rows, server routes, and project cards</text>
  <rect x="48" y="130" width="520" height="250" rx="26" fill="#ffffff" stroke="#bde8cc"/>
  <text x="78" y="174" font-family="Arial" font-size="22" font-weight="700" fill="#183b2b">SQLite table: projects</text>
  <rect x="78" y="210" width="420" height="38" fill="#28a36a"/>
  <text x="94" y="236" font-family="Arial" font-size="16" font-weight="700" fill="#ffffff">id</text>
