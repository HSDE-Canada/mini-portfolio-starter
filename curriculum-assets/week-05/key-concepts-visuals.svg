<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f7f8fc"/>
  <text x="48" y="58" font-family="Arial" font-size="34" font-weight="700" fill="#20243a">Week 5: Servers and Backend Logic</text>
  <text x="48" y="92" font-family="Arial" font-size="18" fill="#5d6478">Terminal-style outputs for Express routes, request data, JSON responses, and validation</text>
  <rect x="48" y="130" width="1104" height="560" rx="26" fill="#111827"/>
  <circle cx="84" cy="164" r="8" fill="#ef4444"/><circle cx="112" cy="164" r="8" fill="#f59e0b"/><circle cx="140" cy="164" r="8" fill="#22c55e"/>
  <text x="170" y="170" font-family="Arial" font-size="16" fill="#9ca3af">Terminal: backend examples from Key Concepts</text>
  <text x="82" y="230" font-family="Courier New" font-size="23" fill="#22c55e">$ node server.js</text>
  <text x="82" y="270" font-family="Courier New" font-size="23" fill="#ffffff">Server is running on http://localhost:3000</text>
  <text x="82" y="340" font-family="Courier New" font-size="23" fill="#60a5fa">Frontend sends quiz answers to POST /grade-quiz</text>
  <text x="82" y="380" font-family="Courier New" font-size="22" fill="#ffffff">Server reads the request body</text>
  <text x="82" y="420" font-family="Courier New" font-size="22" fill="#ffffff">Server compares submitted answers with correct answers</text>
  <text x="82" y="500" font-family="Courier New" font-size="23" fill="#fbbf24">Server response</text>
  <text x="82" y="540" font-family="Courier New" font-size="22" fill="#ffffff">score: 2, total: 2, message: Excellent work!</text>
  <text x="82" y="610" font-family="Courier New" font-size="22" fill="#f87171">Validation: missing answers return a helpful response instead of breaking</text>
  <rect x="84" y="652" width="12" height="26" fill="#ffffff"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
</svg>